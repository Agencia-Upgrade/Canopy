name: Deploy to Staging
# Agência Upgrade — https://agenciaupgrade.com.br

on:
  push:
    branches:
      - dev

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            BEDROCK="${{ secrets.STAGING_WP_PATH }}"
            WP="wp --path=$BEDROCK/web/wp"

            cd "$BEDROCK"

            echo "→ Pulling latest code (dev)..."
            git fetch origin
            git reset --hard origin/dev

            echo "→ Installing dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --quiet

            echo "→ Flushing rewrite rules..."
            $WP rewrite flush --allow-root --quiet

            echo "→ Clearing caches..."
            $WP cache flush --allow-root --quiet
            $WP eval 'Timber\Cache\Cleaner::clear_cache_timber();' --allow-root --quiet
            $WP eval 'Timber\Cache\Cleaner::clear_cache_twig();' --allow-root --quiet

            echo "✓ Staging deployment complete"
