name: Deploy to Production
# Agência Upgrade — https://agenciaupgrade.com.br

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          port: ${{ secrets.PROD_SSH_PORT }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            BEDROCK="${{ secrets.PROD_WP_PATH }}"
            WP="wp --path=$BEDROCK/web/wp"

            cd "$BEDROCK"

            echo "→ Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "→ Installing dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --quiet

            echo "→ Flushing rewrite rules..."
            $WP rewrite flush --allow-root --quiet

            echo "→ Clearing caches..."
            $WP cache flush --allow-root --quiet
            $WP eval 'Timber\Cache\Cleaner::clear_cache_timber();' --allow-root --quiet

            echo "→ Purging Cloudflare cache..."
            curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}'

            echo "✓ Deployment complete"
