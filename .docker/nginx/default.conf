# Nginx Configuration for Canopy (Bedrock)
# Agência Upgrade — https://agenciaupgrade.com.br

server {
    listen 80;
    server_name localhost;

    root /var/www/html/web;
    index index.php;

    charset utf-8;

    client_max_body_size 128M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/js text/xml text/javascript
               application/javascript application/x-javascript application/json
               application/xml+rss application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Deny access to .git, .htaccess, .env, etc.
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    # WordPress rewrite rules
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Pass PHP to FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
        include fastcgi_params;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        log_not_found off;
    }

    # Deny access to uploads and other dirs
    location ~* ^/app/.*\.php$ {
        deny all;
    }

    # Deny wp-config.php
    location = /wp-config.php {
        deny all;
    }
}
