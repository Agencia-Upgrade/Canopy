# Canopy — ambiente de desenvolvimento local
# Agência Upgrade — https://agenciaupgrade.com.br

name: canopy

services:

  nginx:
    platform: linux/amd64
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:cached
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - canopy

  php:
    platform: linux/amd64
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    user: "1000:1000"
    volumes:
      - ./:/var/www/html:cached
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - canopy
    depends_on:
      db:
        condition: service_healthy

  db:
    platform: linux/amd64
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE:      canopy_local
      MYSQL_USER:          dev
      MYSQL_PASSWORD:      dev
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - canopy
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    platform: linux/amd64
    image: redis:alpine
    networks:
      - canopy

  mailpit:
    platform: linux/amd64
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - canopy

volumes:
  db_data:

networks:
  canopy:
